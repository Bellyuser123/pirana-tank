<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirana Tank - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes introPulse { 0%, 100% { transform: scale(1); opacity: .85; } 50% { transform: scale(1.08); opacity: 1; } }
        @keyframes introPan {
            0% { transform: scale(1.06) translate3d(-2%, -1%, 0); }
            50% { transform: scale(1.12) translate3d(2%, 1%, 0); }
            100% { transform: scale(1.06) translate3d(-2%, -1%, 0); }
        }
        .fade-up { animation: fadeUp .5s ease-out both; }
        .intro-screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity .55s cubic-bezier(0.22, 1, 0.36, 1), transform .55s cubic-bezier(0.22, 1, 0.36, 1), visibility .55s;
            background: radial-gradient(circle at 25% 25%, rgba(37, 99, 235, 0.35), transparent 45%), #020617;
        }
        .intro-bg {
            position: absolute;
            inset: -12%;
            background:
                radial-gradient(circle at 80% 30%, rgba(14, 165, 233, .28), transparent 45%),
                radial-gradient(circle at 35% 75%, rgba(168, 85, 247, .2), transparent 42%);
            filter: blur(20px);
            animation: introPan 12s ease-in-out infinite;
            pointer-events: none;
        }
        .intro-content { position: relative; text-align: center; }
        .intro-logo { animation: introPulse 2.2s ease-in-out infinite; }
        .intro-hide { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(0.96) translateY(-16px); }
        .login-wrap {
            opacity: 0;
            transform: translateY(28px) scale(0.94);
            transition: opacity .65s cubic-bezier(0.22, 1, 0.36, 1) .08s, transform .65s cubic-bezier(0.22, 1, 0.36, 1) .08s;
        }
        .login-wrap.show { opacity: 1; transform: translateY(0) scale(1); }
        @media (prefers-reduced-motion: reduce) {
            .fade-up, .intro-logo, .intro-bg { animation: none; }
            .intro-screen, .login-wrap { transition-duration: .2s; }
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">
    <div id="intro" class="intro-screen">
        <div class="intro-bg"></div>
        <div class="intro-content px-6">
            <h1 class="intro-logo text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-300 via-blue-400 to-cyan-300">PIRANA TANK</h1>
            <p class="text-slate-300 mt-4 text-sm md:text-base">Live Investment Control System</p>
        </div>
    </div>
    <div id="loginWrap" class="login-wrap max-w-md w-full">
    <div class="max-w-md w-full bg-slate-900 rounded-2xl p-8 border border-slate-800 shadow-2xl shadow-blue-500/10 fade-up transition duration-300 hover:-translate-y-1">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600 mb-2 text-center">PIRANA TANK</h1>
        <p class="text-slate-400 text-center mb-8">Live Investment Control System</p>
        <form method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Enter your name" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition duration-200">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 hover:scale-[1.01] active:scale-100 text-white font-bold py-3 rounded-xl transition duration-200">Enter Tank</button>
        </form>
        {% if piranas %}
        <div class="mt-8 pt-6 border-t border-slate-800">
            <h3 class="text-sm text-slate-400 mb-3">Quick Select</h3>
            <div class="grid grid-cols-2 gap-2">
                {% for p in piranas %}
                <form method="POST" class="inline"><input type="hidden" name="name" value="{{ p.name }}">
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-blue-500 hover:-translate-y-0.5 rounded-lg px-3 py-2 text-white text-sm transition duration-200 truncate">{{ p.name }}</button>
                </form>{% endfor %}
            </div>
        </div>{% endif %}
        <div class="mt-8 pt-6 border-t border-slate-800">
            <button onclick="document.getElementById('ap').classList.toggle('hidden')" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-400 font-medium py-2 rounded-xl text-sm transition duration-200">Admin Login</button>
            <form id="ap" method="POST" action="/admin/login" class="mt-3 hidden space-y-3">
                <input type="password" name="pin" placeholder="PIN" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 hover:scale-[1.01] active:scale-100 text-white font-bold py-3 rounded-xl transition duration-200">Login</button>
            </form>
        </div>
    </div>
    </div>
    <script>
        const intro = document.getElementById('intro');
        const loginWrap = document.getElementById('loginWrap');
        let shown = false;
        function showLogin() {
            if (shown) return;
            shown = true;
            document.body.style.overflow = 'auto';
            intro.classList.add('intro-hide');
            requestAnimationFrame(() => loginWrap.classList.add('show'));
            setTimeout(() => intro.remove(), 600);
            window.removeEventListener('wheel', onWheel, { passive: true });
            window.removeEventListener('touchmove', onTouchMove, { passive: true });
        }
        function onWheel() { showLogin(); }
        function onTouchMove() { showLogin(); }
        intro.addEventListener('dblclick', showLogin);
        window.addEventListener('wheel', onWheel, { passive: true });
        window.addEventListener('touchmove', onTouchMove, { passive: true });
    </script>
</body>
</html>
